services:
  charactersheet:
    build: .
    container_name: charactersheet
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CS_DATA_FILE=/data/users.json
    volumes:
      # Persist registered users + synced characters across redeploys.
      - ./data:/data
    networks: [traefik_proxy]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      # Expose at https://character.klatt.pro (syncdns registers the DNS record
      # from this Host rule; TLS via the shared Let's Encrypt resolver).
      - traefik.http.routers.charactersheet.rule=Host(`character.klatt.pro`)
      - traefik.http.routers.charactersheet.entrypoints=websecure
      - traefik.http.routers.charactersheet.tls.certresolver=le
      - traefik.http.routers.charactersheet.priority=100
      - traefik.http.routers.charactersheet.service=charactersheet
      - traefik.http.services.charactersheet.loadbalancer.server.port=3000

networks:
  traefik_proxy:
    external: true
